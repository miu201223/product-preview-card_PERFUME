<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PERFUME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@4.0.1/destyle.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon-180x180.png">
  <link rel="icon" type="image/png" href="images/apple-touch-icon-180x180.png" sizes="180x180">
</head>
<body>
  <div class="container">
    <main class="card">
      <div class="card-image">
        <picture>
          <source media="(max-width: 600px)" srcset="images/image-product-mobile.jpg">
          <img src="images/image-product-desktop.jpg" alt="perfume">
        </picture>
      </div>
      <div class="card-content">
        <div class="card-content_inner">
          <div class="category font-mon">
            PERFUME
          </div>
          <div class="product-name font-fra">
            <h1>
              Gabrielle Essence Eau De Parfum
            </h1>
          </div>
          <div class="description font-mon">
            <p>
              A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
            </p>
          </div>
          <div class="price">
            <div class="current font-fra">$149.99</div>
            <div class="old font-mon"><del>$169.99</del></div>
          </div>
          <button class="cart-btn font-mon_bold">
            <img class="cart-btn_img" src="images/icon-cart.svg" alt="">
            <p>Add to Cart</p>
          </button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
